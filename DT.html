<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard Tam Hòa - V31.28</title>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 90%; max-width: 480px; border: 1px solid #333; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .date-info { text-align: center; font-size: 13px; color: #888; margin-bottom: 20px; }
        textarea { width: 100%; height: 110px; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: #fff; box-sizing: border-box; resize: none; font-size: 15px; margin-bottom: 15px; outline: none; }
        textarea:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #00cc6e; transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; }
        #aiResult { margin-top: 20px; padding: 15px; background: #262626; border-radius: 8px; border-left: 4px solid var(--primary); min-height: 60px; line-height: 1.6; white-space: pre-wrap; font-size: 15px; display: none; }
        .loader { display: none; text-align: center; margin: 15px 0; color: #ffaa00; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>🤖 AI TACTICAL REVIEW</h2>
    <div id="currentDate" class="date-info"></div>

    <textarea id="userInput" placeholder="Nhập doanh thu (VD: 242/500) và tình hình nhân viên..."></textarea>
    
    <button id="btnAction" onclick="callMyAI()">🚀 PHÂN TÍCH & NHẬN XÉT</button>
    
    <div id="loader" class="loader">Đang hỏi ý kiến Gemini... chờ tí ông nhé!</div>
    <div id="aiResult"></div>
</div>

<script>
    // Cập nhật ngày tháng theo đúng yêu cầu của ông
    const d = new Date();
    document.getElementById('currentDate').innerText = `Sức khỏe hiện tại đến ngày ${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;

    async function callMyAI() {
        // LINK WEB APP MỚI CỦA ÔNG
        const webAppUrl = "https://script.google.com/macros/s/AKfycbw4Q5p0uHQPPjn6pjkShE-hP7HJ9e5XtoBw_IwawddrfvAovEg8JJWfq9tY9v8WA7g6/exec";
        
        const prompt = document.getElementById('userInput').value;
        const resultDiv = document.getElementById('aiResult');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btnAction');

        if(!prompt) { alert("Nhập số liệu đã ông ơi!"); return; }

        btn.disabled = true;
        loader.style.display = 'block';
        resultDiv.style.display = 'none';

        try {
            const response = await fetch(webAppUrl, {
                method: 'POST',
                // Gửi dưới dạng text/plain để vượt qua các rào cản CORS khó chịu
                body: JSON.stringify({ prompt: prompt })
            });
            
            const data = await response.json();
            
            loader.style.display = 'none';
            resultDiv.style.display = 'block';
            btn.disabled = false;

            if(data.reply) {
                resultDiv.innerText = data.reply;
            } else {
                resultDiv.innerText = "Lỗi: " + (data.error || "AI không phản hồi");
            }

        } catch (error) {
            loader.style.display = 'none';
            resultDiv.style.display = 'block';
            btn.disabled = false;
            resultDiv.innerText = "Lỗi kết nối! Ông thử mở link Web App trực tiếp trên trình duyệt một lần để cấp quyền nếu nó yêu cầu nhé.";
            console.error(error);
        }
    }
</script>

</body>
</html>
